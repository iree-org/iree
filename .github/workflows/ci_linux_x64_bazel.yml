name: CI - Linux x64 bazel

on:
  workflow_call:
  workflow_dispatch:

jobs:
  linux_x64_bazel:
    runs-on: azure-linux-scale
    container:
      image: ghcr.io/iree-org/cpubuilder_ubuntu_jammy@sha256:78a558b999b230f7e1da376639e14b44f095f30f1777d6a272ba48c0bbdd4ccb
      # Mount a RAM disk and point the Bazel sandbox at it using our custom environment variable.
      options: --mount type=tmpfs,destination=/dev/shm
      env:
        SANDBOX_BASE: /dev/shm
    defaults:
      run:
        shell: bash
    env:
      AZURE_CONNECTION_STRING: "${{ secrets.AZURE_CCACHE_CONNECTION_STRING }}"
      AZURE_CONTAINER: ccache-container
      AZURE_CACHE_BLOB_NAME: bazel-disk-cache.tar.gz
      BAZEL_DISK_CACHE_DIR: /tmp/bazel-disk-cache
    steps:
      - name: "Checking out repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y file zip
          python3 -m pip install -r ./runtime/bindings/python/iree/runtime/build_requirements.txt
          python3 -m pip install --force-reinstall --no-deps cffi
          python3 -m pip install azure-storage-blob
      - name: Restore Bazel disk cache
        run: |
          python3 ./build_tools/bazel/azure_cache.py download /tmp/cache.tar.gz
          mkdir -p "${BAZEL_DISK_CACHE_DIR}"
          if [ -f /tmp/cache.tar.gz ]; then
            tar -xzf /tmp/cache.tar.gz -C "${BAZEL_DISK_CACHE_DIR}"
            rm -f /tmp/cache.tar.gz
          fi
      - name: Build and test with Bazel
        env:
          IREE_CUDA_DEPS_DIR: /usr/local/iree_cuda_deps
        run: |
          ./build_tools/bazel/install_bazelisk.sh 1.21.0
          cp ./build_tools/scripts/fetch_cuda_deps.sh /usr/local/bin
          /usr/local/bin/fetch_cuda_deps.sh ${IREE_CUDA_DEPS_DIR}
          ./build_tools/bazel/build_test_all.sh
      - name: Save Bazel disk cache
        if: always() && github.ref == 'refs/heads/main'
        run: |
          tar -czf /tmp/cache.tar.gz -C "${BAZEL_DISK_CACHE_DIR}" .
          python3 ./build_tools/bazel/azure_cache.py upload /tmp/cache.tar.gz

      # Alerting on failure is the responsibility of the calling job.
